<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ambassadors Summit 8.0 - The Theme</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #D90022;
            --bright-red: #FF0033;
            --black: #000000;
            --white: #FFFFFF;
            --dark-gray: #0F0F14;
            --neon-magenta: #FF00FF;
            --neon-cyan: #00FFFF;
            --easing: cubic-bezier(0.85, 0, 0.15, 1);
            --fast-easing: cubic-bezier(0.19, 1, 0.22, 1);
            --elastic: cubic-bezier(0.68, -0.6, 0.32, 1.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--black);
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            cursor: none;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ─── FILMIC NOISE & TECH GRID OVERLAYS ─── */
        .noise {
            position: fixed;
            top: 0; left: 0;
            width: 200%; height: 200%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            z-index: 99999;
            pointer-events: none;
            animation: noise-shift 0.15s infinite linear;
        }
        @keyframes noise-shift {
            0% { transform: translate3d(0,0,0); }
            50% { transform: translate3d(-3%, 3%, 0); }
            100% { transform: translate3d(2%, -2%, 0); }
        }

        .tech-grid-overlay {
            position: absolute;
            inset: 0;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            z-index: 2;
            pointer-events: none;
            animation: grid-drift-diagonal 22s linear infinite;
        }
        @keyframes grid-drift-diagonal {
            0% { background-position: 0px 0px; }
            100% { background-position: 100px 100px; }
        }

        /* Chess Pattern Background */
        .chess-pattern {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(45deg, rgba(255, 255, 255, 0.01) 25%, transparent 25%), 
                linear-gradient(-45deg, rgba(255, 255, 255, 0.01) 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, rgba(255, 255, 255, 0.01) 75%), 
                linear-gradient(-45deg, transparent 75%, rgba(255, 255, 255, 0.01) 75%);
            background-size: 60px 60px;
            background-position: 0 0, 0 30px, 30px -30px, -30px 0px;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.8s var(--easing);
        }
        .scene.active .chess-pattern {
            opacity: 1;
        }

        /* ─── GPU ACCELERATED TRANSITIONS ─── */
        .transition-whip {
            animation: whip-pan-animation 0.45s var(--easing) both;
        }
        @keyframes whip-pan-animation {
            0% { transform: translate3d(100vw, 0, 0) scaleX(1.4); }
            100% { transform: translate3d(0, 0, 0) scaleX(1); }
        }

        .transition-glitch {
            animation: glitch-flash-animation 0.35s steps(2) both;
        }
        @keyframes glitch-flash-animation {
            0% { transform: translate3d(12px, -6px, 0) scale(0.97); }
            50% { transform: translate3d(-12px, 6px, 0) scale(1.03); }
            100% { transform: translate3d(0, 0, 0) scale(1); }
        }

        .transition-zoom {
            animation: zoom-snap-animation 0.48s var(--elastic) both;
        }
        @keyframes zoom-snap-animation {
            0% { transform: scale3d(0.3, 0.3, 1) rotate(-8deg); opacity: 0; }
            100% { transform: scale3d(1, 1, 1) rotate(0deg); opacity: 1; }
        }

        .transition-slam {
            animation: gravity-slam-animation 0.42s var(--fast-easing) both;
        }
        @keyframes gravity-slam-animation {
            0% { transform: translate3d(0, -100vh, 0); }
            65% { transform: translate3d(0, 3vh, 0); }
            100% { transform: translate3d(0, 0, 0); }
        }

        /* Ambient Fluid Glow Backdrops */
        .ambient-glow-container {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }
        .glow-ball {
            position: absolute;
            width: 85vw;
            height: 85vw;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.25;
            will-change: transform;
        }
        .glow-ball-1 {
            background: var(--red);
            top: -20%; left: -10%;
            animation: slow-drift-left 12s ease-in-out infinite alternate;
        }
        .glow-ball-2 {
            background: var(--bright-red);
            bottom: -20%; right: -10%;
            animation: slow-drift-right 12s ease-in-out infinite alternate;
        }
        @keyframes slow-drift-left {
            0% { transform: translate3d(0, 0, 0) scale(1); }
            100% { transform: translate3d(10vw, 15vh, 0) scale(1.2); }
        }
        @keyframes slow-drift-right {
            0% { transform: translate3d(0, 0, 0) scale(1.2); }
            100% { transform: translate3d(-10vw, -15vh, 0) scale(0.95); }
        }

        /* ─── INTERACTIVE GATEWAY OVERLAY ─── */
        #start-overlay {
            position: fixed;
            inset: 0;
            background: var(--black);
            z-index: 100000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s var(--easing), visibility 0.6s var(--easing);
        }
        #start-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .start-btn {
            background: transparent;
            border: 2px solid var(--bright-red);
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 900;
            font-size: clamp(15px, 2.5vw, 20px);
            padding: 1.5rem 3.5rem;
            letter-spacing: 0.3em;
            cursor: pointer;
            transition: all 0.4s var(--fast-easing);
            text-transform: uppercase;
        }
        .start-btn:hover {
            background: var(--bright-red);
            color: var(--black);
            box-shadow: 0 0 50px rgba(255, 0, 51, 0.4);
            transform: scale(1.03);
        }

        /* ─── CORE SCENE ARCHITECTURE ─── */
        #slideshow-container {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 10;
        }
        .scene {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            z-index: 1;
            overflow: hidden;
            will-change: transform, opacity;
        }
        .scene.active {
            opacity: 1;
            visibility: visible;
            z-index: 10;
        }

        h1, h2, p {
            text-transform: uppercase;
            font-weight: 900;
            line-height: 0.85;
        }

        .ghost-bg-text {
            position: absolute;
            font-family: 'Anton', sans-serif;
            font-size: 32vw;
            color: transparent;
            -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.03);
            letter-spacing: -0.05em;
            line-height: 0.8;
            white-space: nowrap;
            user-select: none;
            z-index: 0;
            pointer-events: none;
            will-change: transform;
            transform: scale(0.9);
            transition: transform 1.5s var(--easing);
        }
        .scene.active .ghost-bg-text {
            transform: scale(1.05);
        }

        /* TYPOGRAPHIC HEADLINE STANDARDS */
        .theme-headline {
            font-family: 'Anton', sans-serif;
            font-size: clamp(50px, 12vw, 155px);
            text-align: center;
            letter-spacing: -0.01em;
            line-height: 0.82;
        }
        .theme-headline.white-outline {
            color: transparent;
            -webkit-text-stroke: 3px var(--white);
        }
        .theme-headline.red-outline {
            color: transparent;
            -webkit-text-stroke: 3px var(--bright-red);
        }

        /* MONOSPACE METRIC STAMPS */
        .metric-bracket {
            font-family: 'Space Mono', monospace;
            font-size: clamp(11px, 1.3vw, 18px);
            color: var(--bright-red);
            letter-spacing: 0.3em;
            margin-bottom: 3vh;
            position: relative;
            z-index: 10;
        }

        /* ─── REWORKED SCENE 1: THE ROLE OF... (Stark Crimson Screen-Frame) ─── */
        .crimson-screen-frame {
            border: 8px solid var(--bright-red);
            width: 90vw;
            height: 75vh;
            background: rgba(217, 0, 34, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        /* ─── REWORKED SCENE 4: IN SECURING (Solid High-Contrast White Block Plate) ─── */
        .securing-solid-plate {
            background: var(--white);
            border: 6px solid var(--bright-red);
            width: 88vw;
            padding: 8vh 4vw;
            text-align: center;
            box-shadow: 20px 20px 0 var(--red);
            position: relative;
            z-index: 10;
        }
        .securing-solid-plate h1 {
            color: var(--black);
            font-family: 'Anton', sans-serif;
            font-size: clamp(55px, 12vw, 160px);
            line-height: 0.8;
            letter-spacing: -0.02em;
        }

        /* ─── NEW SCENE 7: FULL COMPLETE THEME DISPLAY CARD ─── */
        .complete-theme-panel {
            border: 4px solid var(--white);
            background: var(--dark-gray);
            width: 88vw;
            padding: 6vh 4vw;
            position: relative;
            z-index: 10;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }
        .complete-theme-panel::before {
            content: '[ EVENT CORE THEME ]';
            position: absolute;
            top: -12px;
            left: 30px;
            background: var(--black);
            padding: 0 10px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--bright-red);
            letter-spacing: 2px;
            font-weight: 700;
        }
        .complete-theme-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(20px, 3.8vw, 44px);
            line-height: 1.15;
            text-align: left;
            font-weight: 900;
            letter-spacing: -0.01em;
            color: var(--white);
            text-transform: uppercase;
        }
        .complete-theme-text span {
            color: var(--bright-red);
        }

        /* ─── KINETIC ELEMENT: CATALYST BLOCK (SCENE 3) ─── */
        .catalyst-frame {
            border: 4px solid var(--bright-red);
            background: rgba(217, 0, 34, 0.02);
            width: 85vw;
            padding: 6vh 4vw;
            text-align: center;
            position: relative;
            transform: scale3d(0.8, 0.8, 1) rotate(-2deg);
            opacity: 0;
            transition: transform 0.8s var(--elastic) 0.2s, opacity 0.6s ease 0.2s;
        }
        .scene.active .catalyst-frame {
            transform: scale3d(1, 1, 1) rotate(0deg);
            opacity: 1;
        }

        /* ─── ACTIVE TYPEWRITER STYLING ─── */
        .typewriter-cursor {
            display: inline-block;
            background-color: var(--bright-red);
            width: 10px;
            height: 1em;
            margin-left: 5px;
            vertical-align: middle;
            animation: cursor-blink 0.8s infinite steps(2);
        }
        @keyframes cursor-blink {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* ─── CINEMATIC PROGRESS INDEX SYSTEM ─── */
        .cinematic-progress {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translate3d(-50%, 0, 0);
            width: 160px;
            height: 3px;
            background: rgba(255,255,255,0.15);
            z-index: 100;
            border-radius: 4px;
            overflow: hidden;
        }
        .cinematic-progress-fill {
            height: 100%;
            width: 0%;
            background: var(--bright-red);
            box-shadow: 0 0 8px var(--bright-red);
        }

        /* Responsive Matrix Adjustments */
        @media (max-width: 768px) {
            .theme-headline { -webkit-text-stroke: 1.5px var(--white); }
            .securing-solid-plate h1 { -webkit-text-stroke: 0px; }
            .crimson-screen-frame { height: 65vh; width: 92vw; border-width: 5px; }
            .securing-solid-plate { width: 92vw; padding: 6vh 3vw; border-width: 4px; }
            .complete-theme-panel { width: 92vw; padding: 5vh 3vw; border-width: 3px; }
        }
    </style>
</head>
<body>

    <!-- START OVERLAY GATEWAY -->
    <div id="start-overlay">
        <button class="start-btn" id="start-action">LAUNCH PRESENTATION</button>
        <p style="margin-top: 1.5rem; font-size: 11px; letter-spacing: 0.2em; color: rgba(255,255,255,0.4); text-transform: uppercase;">Wake Audio Engine &amp; Full Screen</p>
    </div>

    <div class="noise"></div>
    <div class="tech-grid-overlay"></div>
    <div class="ambient-glow-container">
        <div class="glow-ball glow-ball-1"></div>
        <div class="glow-ball glow-ball-2"></div>
    </div>

    <div class="cinematic-progress">
        <div class="cinematic-progress-fill" id="progress-fill"></div>
    </div>

    <div id="slideshow-container">

        <!-- SCENE 1: THE ROLE OF [Reworked Stark Screen-Frame Block] -->
        <div class="scene" id="scene-1">
            <div class="crimson-screen-frame">
                <p class="metric-bracket">[ STAGE_01 // THE INITIAL MODULE ]</p>
                <h1 class="theme-headline typewriter-target" data-text="THE ROLE OF"></h1>
            </div>
        </div>

        <!-- SCENE 2: EMERGING LEADERS -->
        <div class="scene" id="scene-2">
            <div class="chess-pattern"></div>
            <p class="metric-bracket">[ STAGE_02 // GENERATIONAL FOCUS ]</p>
            <h1 class="theme-headline red-outline typewriter-target" data-text="EMERGING LEADERS"></h1>
        </div>

        <!-- SCENE 3: AS CATALYSTS -->
        <div class="scene" id="scene-3">
            <div class="catalyst-frame">
                <p class="metric-bracket" style="margin-bottom: 4vh;">[ INTERACTION AGENT // TRANSFORMATION ]</p>
                <h1 class="theme-headline typewriter-target" data-text="AS CATALYSTS" style="font-size: 9.5vw;"></h1>
            </div>
        </div>

        <!-- SCENE 4: IN SECURING [Reworked Solid High-Contrast White Block Plate] -->
        <div class="scene" id="scene-4">
            <div class="securing-solid-plate">
                <p class="metric-bracket" style="color: var(--black); font-weight: 700; margin-bottom: 2.5vh;">[ STAGE_04 // DEFENSIVE SYSTEM ]</p>
                <h1 class="typewriter-target" data-text="IN SECURING"></h1>
            </div>
        </div>

        <!-- SCENE 5: NIGERIA'S -->
        <div class="scene" id="scene-5">
            <p class="metric-bracket">[ GEOPOLITICAL TARGET COHORT ]</p>
            <h1 class="theme-headline red-outline typewriter-target" data-text="NIGERIA'S"></h1>
        </div>

        <!-- SCENE 6: ECONOMIC PROSPERITY -->
        <div class="scene" id="scene-6">
            <p class="metric-bracket">[ EXPECTED TARGET OUTCOME ]</p>
            <h1 class="theme-headline white-outline typewriter-target" data-text="ECONOMIC PROSPERITY"></h1>
        </div>

        <!-- SCENE 7: FULL COMPLETE THEME DISPLAY [New Ending Scene] -->
        <div class="scene" id="scene-7">
            <div class="chess-pattern"></div>
            <div class="complete-theme-panel">
                <p class="complete-theme-text typewriter-target" data-text="The role of emerging leaders as catalysts in securing Nigeria's economic prosperity."></p>
            </div>
        </div>

    </div>

    <!-- ═══════════════════════════════════════════════════════════════
       12. MOTION ENGINE & AUDIO SYNTHESIZER
       ═══════════════════════════════════════════════════════════════ -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const scenes = document.querySelectorAll('.scene');
            const container = document.getElementById('slideshow-container');
            const progressFill = document.getElementById('progress-fill');
            const startOverlay = document.getElementById('start-overlay');
            const startAction = document.getElementById('start-action');

            let currentScene = 0;
            let presentationStarted = false;
            let currentTypingTimer = null;

            /* TIMELINE SEQUENCE SCRIPT COEFFICIENTS */
            const sceneDurations = [
                3000, // 1: THE ROLE OF
                3200, // 2: EMERGING LEADERS
                3500, // 3: AS CATALYSTS
                3200, // 4: IN SECURING
                2800, // 5: NIGERIA'S
                3200, // 6: ECONOMIC PROSPERITY
                6500  // 7: FULL Theme statement complete render
            ];

            const transitions = ['transition-whip', 'transition-glitch', 'transition-zoom', 'transition-slam'];

            // ─── SYNTHESIZED WEB AUDIO API SYSTEM ───
            let audioCtx = null;
            let audioEnabled = false;

            function initAudio() {
                if (audioCtx) return;
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    audioEnabled = true;
                } catch(e) {}
            }

            function playSweep(freqStart, freqEnd, duration, type = 'sine') {
                if (!audioEnabled || !audioCtx) return;
                try {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freqStart, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(freqEnd, audioCtx.currentTime + duration);
                    
                    gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                    
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + duration);
                } catch(e) {}
            }

            function playGlitchTick() {
                if (!audioEnabled || !audioCtx) return;
                try {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1800, audioCtx.currentTime + 0.08);
                    
                    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
                    
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.08);
                } catch(e) {}
            }

            // ─── KINETIC CHARACTER TYPEWRITER ENGINE ───
            function runTypewriter(sceneElement) {
                // Clear any running typewriter intervals
                if (currentTypingTimer) clearInterval(currentTypingTimer);
                
                const target = sceneElement.querySelector('.typewriter-target');
                if (!target) return;

                const fullText = target.getAttribute('data-text');
                target.innerHTML = ''; // Reset node content

                // Append the blinking cursor block element
                const cursor = document.createElement('span');
                cursor.className = 'typewriter-cursor';
                
                let charIndex = 0;
                // Double typing speed for the longer final statement
                const speed = (currentScene === 6) ? 22 : 45; 

                currentTypingTimer = setInterval(() => {
                    if (charIndex < fullText.length) {
                        // Append text safely character by character
                        const nextChar = fullText.charAt(charIndex);
                        target.insertBefore(document.createTextNode(nextChar), cursor);
                        
                        // Append cursor if not present
                        if (!target.contains(cursor)) {
                            target.appendChild(cursor);
                        }
                        
                        // Emit mechanical sound clicks while writing
                        if (charIndex % 2 === 0) playGlitchTick();
                        
                        charIndex++;
                    } else {
                        clearInterval(currentTypingTimer);
                        // Briefly blink cursor then fade out
                        setTimeout(() => { if (target.contains(cursor)) cursor.remove(); }, 1200);
                    }
                }, speed);
            }

            // ─── FULLSCREEN RUNNER ───
            function requestFullscreen(element) {
                if (element.requestFullscreen) {
                    element.requestFullscreen();
                } else if (element.webkitRequestFullscreen) {
                    element.webkitRequestFullscreen();
                }
            }

            // ─── SCENE ENGINE RUNNER ───
            function showNextScene() {
                if (!presentationStarted) return;
                const prev = currentScene - 1;

                if (prev >= 0) {
                    scenes[prev].classList.remove('active');
                    const oldTarget = scenes[prev].querySelector('.typewriter-target');
                    if (oldTarget) oldTarget.innerHTML = ''; // Wipe content on disable
                }

                if (currentScene >= scenes.length) {
                    currentScene = 0; 
                }

                const randomTransition = transitions[Math.floor(Math.random() * transitions.length)];

                // Sound synchronization sweeps
                if (randomTransition === 'transition-whip') playSweep(450, 120, 0.4, 'triangle');
                if (randomTransition === 'transition-slam') playSweep(180, 50, 0.6, 'sawtooth');
                if (randomTransition === 'transition-zoom') playSweep(750, 250, 0.35, 'sine');
                if (randomTransition === 'transition-glitch') playGlitchTick();

                if (currentScene === 6) {
                    playSweep(120, 30, 1.6, 'sawtooth'); // Climax Sub-bass drop on final full statement
                }

                container.className = '';
                void container.offsetWidth;
                container.classList.add(randomTransition);

                const activeScene = scenes[currentScene];
                activeScene.classList.add('active');
                
                const duration = sceneDurations[currentScene];

                progressFill.style.transition = 'none';
                progressFill.style.width = '0%';
                setTimeout(() => {
                    progressFill.style.transition = `width ${duration}ms linear`;
                    progressFill.style.width = '100%';
                }, 50);

                // Run kinetic character typewriter
                runTypewriter(activeScene);

                setTimeout(() => {
                    currentScene++;
                    showNextScene();
                }, duration);
            }

            startAction.addEventListener('click', () => {
                initAudio();
                requestFullscreen(document.documentElement);
                startOverlay.classList.add('fade-out');
                presentationStarted = true;
                setTimeout(() => { showNextScene(); }, 400);
            });
        });
    </script>
</body>
</html>
